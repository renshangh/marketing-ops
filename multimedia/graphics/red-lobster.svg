      <path d="M 180 -70 C 320 -120 430 -170 500 -250 C 555 -312 550 -395 484 -418 C 408 -445 340 -385 316 -316 C 288 -237 240 -178 160 -110" fill="none" stroke="#9E0E15" stroke-width="82" stroke-linecap="round"/>
      <path d="M 210 -120 C 330 -150 408 -200 452 -260" fill="none" stroke="#FF6A4F" stroke-width="20" stroke-linecap="round" opacity="0.7"/>
      <path d="M 470 -420 C 340 -470 240 -430 180 -350" fill="none" stroke="#FF8A66" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
      <path d="M 500 -250 C 540 -220 572 -165 560 -128 C 548 -90 505 -72 450 -82 C 388 -94 350 -140 330 -188" fill="url(#shell2)" stroke="#7E1116" stroke-width="10"/>
