    <circle cx="-360" cy="-540" r="8" fill="#A7D4FF" opacity="0.12"/>
    <circle cx="-240" cy="-670" r="6" fill="#A7D4FF" opacity="0.10"/>
    <circle cx="350" cy="-560" r="7" fill="#A7D4FF" opacity="0.10"/>
