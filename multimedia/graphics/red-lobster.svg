<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111A"/>
      <stop offset="100%" stop-color="#03070B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FF4D5C" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#FF2A2A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF2A2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D84A31"/>
      <stop offset="45%" stop-color="#A61E17"/>
      <stop offset="100%" stop-color="#4F0A10"/>
    </linearGradient>
    <linearGradient id="shell2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C93B2B"/>
      <stop offset="100%" stop-color="#7B1218"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
