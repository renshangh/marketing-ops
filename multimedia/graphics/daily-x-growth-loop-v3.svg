<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161616;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D1FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.03" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#0F0F0F" />
  <rect width="1600" height="900" fill="url(#grid)" />
  
  <!-- Subtle Header Line -->
  <rect x="80" y="160" width="1440" height="1" fill="url(#accentGrad)" fill-opacity="0.2" />

  <!-- Title -->
  <text x="80" y="120" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="42" fill="#FFFFFF" letter-spacing="-1">Daily X Growth Loop</text>
  <text x="1520" y="118" font-family="ui-monospace, monospace" font-size="14" fill="#00D1FF" text-anchor="end" font-weight="600" letter-spacing="2">SYSTEM_STATUS: ACTIVE</text>

  <!-- Connection Line (Flow) -->
  <path d="M 255 450 L 1345 450" fill="none" stroke="#00D1FF" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.3" />
  
  <!-- Workflow Cards -->
  <g transform="translate(80, 320)">
    <!-- Card 01 -->
    <g>
      <rect width="330" height="260" rx="12" fill="url(#cardGrad)" stroke="#333333" stroke-width="1" />
      <rect width="330" height="4" rx="2" fill="url(#accentGrad)" />
      <text x="30" y="60" font-family="ui-monospace, monospace" font-size="18" font-weight="700" fill="#00D1FF">01</text>
      <text x="30" y="130" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF">Scan top 10<tspan x="30" dy="40">posts.</tspan></text>
      <circle cx="300" cy="40" r="4" fill="#00D1FF" fill-opacity="0.5" />
    </g>

    <!-- Card 02 -->
    <g transform="translate(370, 0)">
      <rect width="330" height="260" rx="12" fill="url(#cardGrad)" stroke="#333333" stroke-width="1" />
      <text x="30" y="60" font-family="ui-monospace, monospace" font-size="18" font-weight="700" fill="#00D1FF">02</text>
      <text x="30" y="130" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF">Reply where<tspan x="30" dy="40">relevant.</tspan></text>
    </g>

    <!-- Card 03 -->
    <g transform="translate(740, 0)">
      <rect width="330" height="260" rx="12" fill="url(#cardGrad)" stroke="#333333" stroke-width="1" />
      <text x="30" y="60" font-family="ui-monospace, monospace" font-size="18" font-weight="700" fill="#00D1FF">03</text>
      <text x="30" y="130" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF">Publish 1<tspan x="30" dy="40">original post.</tspan></text>
    </g>

    <!-- Card 04 -->
    <g transform="translate(1110, 0)">
      <rect width="330" height="260" rx="12" fill="url(#cardGrad)" stroke="#333333" stroke-width="1" />
      <text x="30" y="60" font-family="ui-monospace, monospace" font-size="18" font-weight="700" fill="#00D1FF">04</text>
      <text x="30" y="130" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF">Capture what<tspan x="30" dy="40">got attention.</tspan></text>
      <path d="M 280 40 L 300 40 L 290 50 Z" fill="#00D1FF" fill-opacity="0.5" />
    </g>
  </g>

  <!-- Return Loop Path -->
  <path d="M 1410 580 C 1410 700 190 700 190 580" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-opacity="0.2" />
  <path d="M 185 585 L 190 575 L 195 585" fill="none" stroke="#00D1FF" stroke-width="2" stroke-opacity="0.4" />

  <!-- Footer -->
  <rect x="80" y="780" width="1440" height="1" fill="#333333" />
  <text x="80" y="830" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#888888">
    Speed compounds when the loop is <tspan fill="#FFFFFF" font-weight="600">daily.</tspan>
  </text>
  <text x="1520" y="830" font-family="ui-monospace, monospace" font-size="14" fill="#444444" text-anchor="end">OPC_MKT_V3.2026</text>

  <!-- Corner Accents -->
  <path d="M 40 40 L 60 40 M 40 40 L 40 60" fill="none" stroke="#00D1FF" stroke-width="1" stroke-opacity="0.5" />
  <path d="M 1560 860 L 1540 860 M 1560 860 L 1560 840" fill="none" stroke="#00D1FF" stroke-width="1" stroke-opacity="0.5" />
</svg>
